name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: shellcheck --severity=warning codex-insights analyze.sh install.sh

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: bash -n codex-insights && bash -n analyze.sh && bash -n install.sh
      - name: Test analyze.sh with mock data
        run: |
          mkdir -p ~/.codex/sessions/2025/01/01
          echo '{"session_id":"test-001","ts":1704067200,"text":"hello"}' > ~/.codex/history.jsonl
          echo '{"type":"session_meta","payload":{"cwd":"/tmp/test"}}' > ~/.codex/sessions/2025/01/01/test.jsonl
          echo '{"type":"response_item","payload":{"type":"function_call","name":"exec_command"}}' >> ~/.codex/sessions/2025/01/01/test.jsonl
          output=$(bash analyze.sh)
          test -f "$output"
          echo "Report generated: $output"
